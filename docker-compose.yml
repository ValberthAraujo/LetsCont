version: "3.9"

services:
  # ==========================
  # TRAEFIK (Proxy Reverso)
  # ==========================
  traefik:
    image: traefik:v3.5.3
    container_name: traefik
    restart: always

    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik_dynamic.yml"

      # Entradas
      - "--entrypoints.http.address=:80"
      - "--entrypoints.https.address=:443"

      # Redirecionamento automático HTTP→HTTPS
      - "--entrypoints.http.http.redirections.entrypoint.to=https"
      - "--entrypoints.http.http.redirections.entrypoint.scheme=https"

      # Let's Encrypt (ACME)
      - "--certificatesresolvers.le.acme.email=letscont2025.2@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=http"

      - "--log.level=INFO"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
      - ./traefik_dynamic.yml:/etc/traefik_dynamic.yml:ro

    networks:
      - traefik-public

    labels:
      - "traefik.enable=true"

      # Painel Traefik
      - "traefik.http.routers.traefik.rule=Host(`traefik.letscont.org`)"
      - "traefik.http.routers.traefik.entrypoints=https"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.tls.certresolver=le"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$z3x1nE9b$$PjC/OaK4d2a/oHh/k4j9q."

  # ==========================
  # BACKEND (FastAPI)
  # ==========================
  backend:
    image: letscont-backend:latest
    container_name: letscont-backend
    restart: always
    build: ./src/backend
    expose:
      - "8000"
    depends_on:
      - db
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.letscont.org`)"
      - "traefik.http.routers.api.entrypoints=https"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # ==========================
  # FRONTEND (React/Vite)
  # ==========================
  frontend:
    image: letscont-frontend:latest
    container_name: letscont-frontend
    restart: always
    build: ./src/frontend
    expose:
      - "4173"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.front.rule=Host(`letscont.org`)"
      - "traefik.http.routers.front.entrypoints=https"
      - "traefik.http.routers.front.tls.certresolver=le"
      - "traefik.http.services.front.loadbalancer.server.port=4173"

  # ==========================
  # BANCO DE DADOS (PostgreSQL)
  # ==========================
  db:
    image: postgres:15
    container_name: letscont-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: letscont
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true

volumes:
  postgres_data:
